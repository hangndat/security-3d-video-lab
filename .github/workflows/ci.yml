name: CI

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  pr-full-validation:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      RENDER_PROFILE: reduced
      SECURITY_LAB_RENDER_BACKEND: trace-hash
      NODE_VERSION: "25.6.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Verify pinned runtime and toolchain
        run: |
          node --version
          ffmpeg -version
      - name: Install dependencies
        run: npm ci
      - name: Run content contract validation gate
        run: npm run test -- tests/content-authoring-foundation.test.ts tests/content-contracts.test.ts tests/first-content-batch.test.ts
      - name: Run narrative composition gate
        run: npm run test -- tests/long-form-assembly.test.ts tests/caption-timing-map.test.ts tests/narrative-composition-replay.test.ts
      - name: Run batch quality and expansion module gate
        run: npm run test -- tests/expansion-module-e2e.test.ts tests/expansion-batch-export.test.ts tests/batch-kpi-acceptance.test.ts
      # Governance gates re-enabled for v1.2 milestone close.
      - name: Run requirement traceability gate
        run: npm run validate:requirements
      - name: Run requirement traceability tests
        run: npm run test -- tests/requirement-traceability.test.ts
      - name: Run canonical E2E smoke gate
        run: npm run test:e2e:all -- --smoke
      - name: Run deterministic render smoke gate
        run: npm run test:e2e:render-smoke
      - name: Generate dual-format verification evidence
        run: |
          npm run verify:content-authoring
          npm run verify:narrative-composition
          npm run verify:narration-pipeline -- --quick
          npm run verify:batch-quality
          npm run verify:content-depth -- --quick
          npm run verify:crew-skills -- --quick
          npm run verify:tts-integration -- --quick
          npm run verify:tls-production -- --quick
          npm run verify:headless-capture -- --quick
          npm run verify:3d-render -- --quick
      - name: Run milestone audit tests
        run: npm run test -- tests/milestone-governance.test.ts
      - name: Run milestone governance gate
        run: npm run verify:milestone-governance -- --quick
      - name: Run full baseline test suite
        run: npm test
      - name: Upload failure evidence bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-full-validation-evidence
          path: |
            .artifacts/repro/**
            .artifacts/logs/**
            .artifacts/trace/**
            .artifacts/verification/**
          if-no-files-found: warn
          retention-days: 7

  pr-render-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: [tls, ssh, dns]
    env:
      RENDER_PROFILE: reduced
      SECURITY_LAB_RENDER_BACKEND: trace-hash
      CANONICAL_SCENARIO: ${{ matrix.scenario }}
      NODE_VERSION: "25.6.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Verify pinned runtime and toolchain
        run: |
          node --version
          ffmpeg -version
      - name: Install dependencies
        run: npm ci
      - name: Run deterministic smoke gate
        run: npm run test:e2e:render-smoke
      - name: Run scenario-scoped canonical flow
        run: npm run test -- tests/e2e-canonical-flows.test.ts --testNamePattern="${{ matrix.scenario }} canonical flow"
      - name: Upload failure evidence bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-smoke-${{ matrix.scenario }}-evidence
          path: |
            .artifacts/repro/**
            .artifacts/logs/**
            .artifacts/trace/**
          if-no-files-found: warn
          retention-days: 7

  nightly-render-matrix:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: [tls, ssh, dns]
    env:
      RENDER_PROFILE: full
      SECURITY_LAB_RENDER_BACKEND: trace-hash
      CANONICAL_SCENARIO: ${{ matrix.scenario }}
      NODE_VERSION: "25.6.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Verify pinned runtime and toolchain
        run: |
          node --version
          ffmpeg -version
      - name: Install dependencies
        run: npm ci
      - name: Run nightly deterministic gate (one retry on transient failure)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_on: error
          command: npm run test:e2e:render-smoke
      - name: Run full test suite
        run: npm test
      - name: Run 3D render verification gate
        run: npm run verify:3d-render -- --quick
      - name: Upload nightly evidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.scenario }}-evidence
          path: |
            .artifacts/repro/**
            .artifacts/logs/**
            .artifacts/trace/**
          if-no-files-found: warn
          retention-days: 14
